name: Build ZIP & Sync to HuggingFace

on:
  push:
    branches: [main]

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build sprites.zip
        run: |
          cd ${{ github.workspace }}
          zip -r sprites.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "LICENSE" \
            -x "*.md"
          echo "ZIP_SIZE=$(du -h sprites.zip | cut -f1)" >> $GITHUB_ENV
          echo "ZIP_SHA256=$(sha256sum sprites.zip | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest sprites.zip \
            --title "Ankimon Sprites (latest)" \
            --notes "Auto-generated sprite archive.

          **SHA256:** \`${ZIP_SHA256}\`
          **Size:** ${ZIP_SIZE}
          **Commit:** ${{ github.sha }}" \
            --latest

      - name: Push ZIP-only to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create a fresh repo with ONLY the ZIP (no binary sprite files)
          tmp=$(mktemp -d)
          cd "$tmp"
          git init
          git lfs install
          git lfs track "sprites.zip"
          cp "${{ github.workspace }}/sprites.zip" .
          git add .gitattributes sprites.zip
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "sprites.zip built from h0tp-ftw/ankimon-sprites@${{ github.sha }}"
          git push --force https://h0tp:${HF_TOKEN}@huggingface.co/datasets/h0tp/ankimon main
